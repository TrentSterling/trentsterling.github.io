let _worldReady = false;
function ensureWorld() {
    if (_worldReady) return;
    initRenderer(document.getElementById('c'));
    createWorld();
    _worldReady = true;
}
// find an empty tilled (soil) tile to plant on
function findSoil() {
    let found = null;
    forEachFarmTile((x, z, t) => { if (!found && t.type === TILE.SOIL && !t.crop) found = { x, z }; });
    return found;
}

const results = [];
function check(name, fn) {
    try {
        const msg = fn();
        results.push({ name, pass: true, msg: msg || '' });
    } catch (e) {
        results.push({ name, pass: false, msg: (e && e.message) || String(e) });
    }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }

// ---------- ITEM REGISTRY INTEGRITY (guards "adding items") ----------

check('every seed maps to a real crop', () => {
    const seeds = Object.entries(ITEMS).filter(([, v]) => v.type === 'seed');
    assert(seeds.length > 0, 'no seeds defined');
    for (const [id, item] of seeds) {
        assert(item.cropId, `${id} has no cropId`);
        assert(CROPS[item.cropId], `${id} -> unknown crop "${item.cropId}"`);
    }
    return `${seeds.length} seeds OK`;
});

check('every crop is sellable with a positive price', () => {
    const crops = Object.entries(ITEMS).filter(([, v]) => v.type === 'crop');
    for (const [id, item] of crops) {
        assert(typeof item.sellPrice === 'number' && item.sellPrice > 0, `${id} bad sellPrice`);
        assert(item.name, `${id} missing name`);
    }
    return `${crops.length} sellable items OK`;
});

check('every harvestable CROP yields a real item', () => {
    for (const id in CROPS) {
        const h = CROPS[id].harvestItem;
        assert(h && ITEMS[h], `crop ${id} -> unknown harvestItem "${h}"`);
        assert(CROPS[id].harvestQty > 0, `crop ${id} bad harvestQty`);
    }
    return `${Object.keys(CROPS).length} crops OK`;
});

check('every recipe input/output is a known item', () => {
    for (const id in RECIPES) {
        const r = RECIPES[id];
        assert(ITEMS[r.out], `recipe ${id} -> unknown output "${r.out}"`);
        for (const k in r.inputs) assert(ITEMS[k], `recipe ${id} -> unknown input "${k}"`);
    }
    return `${Object.keys(RECIPES).length} recipes OK`;
});

// ---------- ECONOMY RULES (regression guards for stated requirements) ----------

check('goat milk sells for more than cow milk', () =>
    assert(ITEMS.goat_milk.sellPrice > ITEMS.cow_milk.sellPrice,
        `goat ${ITEMS.goat_milk.sellPrice} !> cow ${ITEMS.cow_milk.sellPrice}`)
    || `goat ${ITEMS.goat_milk.sellPrice} > cow ${ITEMS.cow_milk.sellPrice}`);

check('square watermelon is the priciest raw crop', () => {
    const raw = Object.entries(ITEMS).filter(([, v]) => v.type === 'crop' && !v.crafted);
    const top = raw.sort((a, b) => b[1].sellPrice - a[1].sellPrice)[0][0];
    assert(top === 'square_watermelon', `priciest raw crop is "${top}"`);
    return `top raw = square_watermelon (${ITEMS.square_watermelon.sellPrice})`;
});

check('crafted goods are worth more than their inputs', () => {
    for (const id in RECIPES) {
        const r = RECIPES[id];
        const inCost = Object.keys(r.inputs).reduce((s, k) => s + (ITEMS[k].sellPrice || 0) * r.inputs[k], 0);
        assert(ITEMS[r.out].sellPrice > inCost, `${id}: out ${ITEMS[r.out].sellPrice} <= inputs ${inCost}`);
    }
    return 'all recipes profitable';
});

// ---------- MARKET DYNAMICS ----------

check('market price stays within floor/ceil and reacts to flooding', () => {
    initMarket();
    const base = getPrice('wheat');
    assert(base >= 1, 'price under 1');
    recordSale('wheat', 200); // flood
    const flooded = getPrice('wheat');
    assert(flooded < base, `flooding did not lower price (${base} -> ${flooded})`);
    dailyTick(); // recovers somewhat
    const recovered = getPrice('wheat');
    assert(recovered >= flooded, 'price did not recover after a day');
    return `wheat ${base} -> flood ${flooded} -> +1day ${recovered}`;
});

check('market bag value sums every sellable stack at current price', () => {
    initMarket();
    const inv = createInventory();
    inv.add('wheat', 3);
    inv.add('honey', 2);
    const expected = getPrice('wheat') * 3 + getPrice('honey') * 2;
    const bag = sellableValue(inv);
    assert(bag.count === 5, `count ${bag.count} != 5`);
    assert(bag.total === expected, `total ${bag.total} != expected ${expected}`);
    assert(sellableValue(createInventory()).total === 0, 'empty bag should be worth 0');
    return `bag ${bag.count} items = 🪙${bag.total}`;
});

check('overlays: ESC/backdrop close every menu generically (#56)', () => {
    const a = document.createElement('div'); a.className = 'overlay';            // open
    const b = document.createElement('div'); b.className = 'overlay hidden';     // already closed
    document.body.append(a, b);
    assert(anyOverlayOpen(), 'should detect the open overlay');
    hideAllOverlays();
    assert(a.classList.contains('hidden') && b.classList.contains('hidden'), 'not all overlays hidden');
    assert(!anyOverlayOpen(), 'no overlay should remain open');
    a.remove(); b.remove();
    return 'open detected, all closed';
});

check('overlays: every panel gets one corner ✕ that closes it (#56)', () => {
    const ov = document.createElement('div'); ov.className = 'overlay';
    const panel = document.createElement('div'); panel.className = 'overlay-panel';
    ov.appendChild(panel); document.body.appendChild(ov);
    initOverlayChrome(ov);
    const x = panel.querySelector(':scope > .overlay-x');
    assert(x, 'no corner ✕ was added');
    initOverlayChrome(ov); // idempotent — must not duplicate
    assert(panel.querySelectorAll('.overlay-x').length === 1, 'duplicate ✕ added on re-init');
    x.click();
    assert(ov.classList.contains('hidden'), 'corner ✕ did not close the overlay');
    ov.remove();
    return 'corner ✕ added once, closes panel';
});

// ---------- TREE CHOPPING (render path) ----------

check('chopping a tree takes 3 hits, drops 2-4 wood, leaves a regrowing stump', () => {
    ensureWorld();
    // find first choppable tree
    let hit = null;
    outer:
    for (let z = 0; z < 48; z++) for (let x = 0; x < 48; x++) {
        const r = chopTree(x, z);
        if (r) {
            // chopTree returns the felled tree's own coords (3x3 forgiving search)
            const key = `${r.x},${r.z}`;
            assert(r.felled === false, 'tree felled in one hit (HP should be 3)');
            const r2 = chopTree(r.x, r.z); assert(r2 && !r2.felled, 'felled on 2nd hit');
            const r3 = chopTree(r.x, r.z); assert(r3 && r3.felled, 'not felled on 3rd hit');
            const w = r3.drops.wood;
            assert(w >= 2 && w <= 4, `wood drop out of range: ${w}`);
            hit = { key, w };
            break outer;
        }
    }
    assert(hit, 'no choppable tree found in world');
    const ser = serializeTrees();
    const stump = ser.find(e => e.k === hit.key && e.s);
    assert(stump, 'felled tree not serialized as stump');
    assert(stump.r > 0, 'stump has no regrow timer');
    loadTrees(ser); // round-trip must not throw
    return `felled @${hit.key}, ${hit.w} wood, stump regrow=${stump.r}s`;
});

// ---------- CROPS: regrow + water ----------

check('regrowing crop re-ripens; one-shot crop clears to soil', () => {
    ensureWorld();
    assert(CROPS.tomato.regrows, 'tomato should regrow');
    assert(!CROPS.carrot.regrows, 'carrot should not regrow');

    const a = findSoil();
    assert(a, 'no soil tile to plant on');
    plantCrop(a.x, a.z, 'tomato');
    getTile(a.x, a.z).cropStage = 3; // force mature
    const r1 = harvestCrop(a.x, a.z);
    assert(r1 && r1.regrew, 'tomato harvest did not regrow');
    const ta = getTile(a.x, a.z);
    assert(ta.type === TILE.PLANTED && ta.crop === 'tomato' && ta.cropStage < 3, 'tomato tile not replanted');

    const b = findSoil();
    plantCrop(b.x, b.z, 'carrot');
    getTile(b.x, b.z).cropStage = 3;
    const r2 = harvestCrop(b.x, b.z);
    assert(r2 && !r2.regrew, 'carrot should be one-shot');
    assert(getTile(b.x, b.z).type === TILE.SOIL && !getTile(b.x, b.z).crop, 'carrot tile not cleared');
    return 'tomato re-ripens, carrot clears';
});

check('watered crops grow faster than dry crops', () => {
    ensureWorld();
    const a = findSoil(); plantCrop(a.x, a.z, 'carrot'); waterTile(getTile(a.x, a.z));
    const b = findSoil(); plantCrop(b.x, b.z, 'carrot'); // left dry
    for (let i = 0; i < 130; i++) updateCrops(0.1); // ~13s
    const wet = getTile(a.x, a.z).cropStage;
    const dry = getTile(b.x, b.z).cropStage;
    assert(wet > dry, `watered (${wet}) not ahead of dry (${dry})`);
    return `watered stage ${wet} > dry stage ${dry}`;
});

check('crop quality: watered harvests are premium (bonus yield + stars)', () => {
    // pure grading logic
    assert(harvestQuality(false, 0.1).bonus === 0 && harvestQuality(false, 0.9).stars === 0, 'dry harvest earns nothing');
    const good = harvestQuality(true, 0.9);
    assert(good.stars === 1 && good.bonus === 1, 'watered should be ⭐ +1');
    const great = harvestQuality(true, 0.1);
    assert(great.stars === 2 && great.bonus === 2, 'lucky watered should be ⭐⭐ +2');
    // harvestCrop must report the tile's watered state so main can grade it
    ensureWorld();
    const a = findSoil(); plantCrop(a.x, a.z, 'carrot'); waterTile(getTile(a.x, a.z));
    getTile(a.x, a.z).cropStage = 3; // force mature
    const r = harvestCrop(a.x, a.z);
    assert(r && r.watered === true, 'harvestCrop did not report watered state');
    return 'dry 0, watered ⭐+1, lucky ⭐⭐+2, harvest reports watered';
});

check('crop quality: a luck buff widens the ⭐⭐ band (#50)', () => {
    // roll 0.4: no luck (band 0.25) -> ⭐; 2x luck (band 0.5) -> ⭐⭐
    assert(harvestQuality(true, 0.4, 1).stars === 1, 'no luck: 0.4 should be ⭐');
    assert(harvestQuality(true, 0.4, 2).stars === 2, '2x luck: 0.4 should be ⭐⭐');
    assert(harvestQuality(false, 0.1, 3).bonus === 0, 'dry harvest ignores luck');
    // band is capped so a buff never makes ⭐⭐ a certainty
    assert(harvestQuality(true, 0.74, 10).stars === 2 && harvestQuality(true, 0.99, 10).stars === 1, 'luck band should cap at 0.75');
    return 'luck widens 0.25→0.5 band, capped 0.75';
});

check('crop quality: rare ⭐⭐⭐ golden harvest, luck-boosted (#53)', () => {
    // very low roll on a watered crop = golden (the top tier)
    const g = harvestQuality(true, 0.0, 1);
    assert(g.stars === 3 && g.bonus === 3 && g.golden === true, 'roll ~0 watered should be a golden ⭐⭐⭐');
    // golden is rare without luck, but a luck buff widens its band
    assert(harvestQuality(true, 0.03, 1).golden !== true, '0.03 should not be golden at 1x luck');
    assert(harvestQuality(true, 0.03, 3).golden === true, 'a luck buff should make 0.03 golden');
    // never golden on a dry harvest, no matter the luck
    assert(!harvestQuality(false, 0.0, 10).golden, 'dry harvest can never be golden');
    return 'golden ⭐⭐⭐ at the rare low end, luck-boosted';
});

check('buffs: meals grant per-stat luck & speed buffs that expire independently (#50)', () => {
    clearBuffs();
    assert(luckMult() === 1 && speedMult() === 1, 'no buffs should be 1x both');
    assert(applyMeal('carrot') === null, 'plain food should grant no buff');
    assert(applyMeal('grand_elixir').stat === 'luck' && luckMult() === 3, 'grand elixir → 3x luck (120s)');
    assert(applyMeal('fish_stew').stat === 'speed' && speedMult() === 1.35, 'fish stew → 1.35x speed (90s)');
    assert(luckMult() === 3 && speedMult() === 1.35, 'luck and speed should both be active at once');
    tickBuffs(95); // past speed's 90s, still inside luck's 120s
    assert(speedMult() === 1 && luckMult() === 3, 'speed should expire while luck persists');
    tickBuffs(30); // now past luck's 120s too
    assert(luckMult() === 1, 'luck should expire too');
    clearBuffs();
    return 'luck 3x(120s) + speed 1.35x(90s), independent expiry';
});

check('buffs: a growth meal makes crops ripen faster (#50)', () => {
    ensureWorld();
    clearBuffs();
    const stageTime = CROPS.carrot.growTime / 3;
    const progress = (t) => t.cropStage * stageTime + t.cropTimer; // total growth-time accrued
    // baseline: a watered carrot grown with NO buff
    const a = findSoil(); plantCrop(a.x, a.z, 'carrot'); waterTile(getTile(a.x, a.z));
    for (let i = 0; i < 60; i++) updateCrops(0.1);
    const baseP = progress(getTile(a.x, a.z));
    // buffed: a fresh watered carrot grown for the same time with the growth buff active
    applyMeal('veggie_soup');
    const b = findSoil(); plantCrop(b.x, b.z, 'carrot'); waterTile(getTile(b.x, b.z));
    for (let i = 0; i < 60; i++) updateCrops(0.1);
    const buffP = progress(getTile(b.x, b.z));
    clearBuffs();
    assert(baseP > 0, 'baseline crop should have grown');
    assert(buffP > baseP * 1.2, `growth buff should clearly outpace baseline (buff ${buffP.toFixed(1)} vs base ${baseP.toFixed(1)})`);
    return `growth buff ${buffP.toFixed(1)} > baseline ${baseP.toFixed(1)}`;
});

check('buffs: HUD helpers format remaining time + tag each buff with an icon (#50)', () => {
    clearBuffs();
    assert(fmtBuffTime(90) === '1:30', `90s → ${fmtBuffTime(90)}`);
    assert(fmtBuffTime(45) === '45s', `45s → ${fmtBuffTime(45)}`);
    assert(fmtBuffTime(125) === '2:05', `125s → ${fmtBuffTime(125)}`);
    assert(fmtBuffTime(0) === '0s' && fmtBuffTime(-3) === '0s', 'non-positive time → 0s');
    applyMeal('honey_cake');
    const list = activeBuffs();
    assert(list.length === 1 && list[0].stat === 'luck' && list[0].icon === '🍀', 'luck buff should carry a 🍀 icon for the pill');
    clearBuffs();
    assert(activeBuffs().length === 0, 'cleared');
    return '1:30 / 45s / 2:05, luck pill = 🍀';
});

check('netsync: tile deltas + player packets round-trip JSON-safe (#8 groundwork)', () => {
    // packTile: only meaningful fields, defaults omitted (small packets)
    const soil = packTile({ type: 1 });
    assert(soil.ty === 1 && !('c' in soil) && !('w' in soil), 'soil should pack to just its type');
    const planted = packTile({ type: 2, crop: 'carrot', cropStage: 2, watered: true });
    assert(planted.ty === 2 && planted.c === 'carrot' && planted.s === 2 && planted.w === 1, 'planted+watered should pack fully');
    // a delta set records edits and round-trips through JSON via encode/apply
    const ds = createDeltaSet();
    ds.record(3, 7, { type: 2, crop: 'tomato', cropStage: 1, watered: true });
    ds.record(-2, 40, { type: 1 });
    assert(ds.size === 2 && ds.has(3, 7), 'delta set should hold both edits');
    const wire = JSON.parse(JSON.stringify(ds.encode())); // must survive transport
    const got = {};
    ds.apply(wire, (x, z, t) => { got[tileKey(x, z)] = { x, z, t }; });
    assert(got['3,7'].x === 3 && got['3,7'].z === 7 && got['3,7'].t.c === 'tomato', 'delta applied at the right coord');
    assert(got['-2,40'].x === -2 && got['-2,40'].z === 40, 'negative/large coords must parse back');
    // player packet stays tiny but keeps identity
    const pp = packPlayer({ x: 12.34567, z: -8.9876, r: 1.5708, name: 'Jenn' });
    assert(pp.x === 12.35 && pp.z === -8.99 && pp.n === 'Jenn', `player packed wrong: ${JSON.stringify(pp)}`);
    return `2 deltas round-trip; player @(${pp.x}, ${pp.z})`;
});

check('netsync: a remote peer eases toward received transforms (#8)', () => {
    const peer = createRemotePeer();
    peer.receive(packPlayer({ x: 10, z: 4, r: 0, name: 'Trent' }));
    assert(peer.name === 'Trent', 'peer should take the name from the first packet');
    assert(peer.pos.x === 10 && peer.pos.z === 4, 'first packet should snap into place (no slide from origin)');
    peer.receive(packPlayer({ x: 20, z: 4 })); // new target; name unchanged
    for (let i = 0; i < 60; i++) peer.step(0.1);
    assert(Math.abs(peer.pos.x - 20) < 0.1, `peer should converge to the target (at ${peer.pos.x.toFixed(2)})`);
    assert(peer.name === 'Trent', 'a nameless packet must not wipe the peer name');
    // shortest-angle heading interpolation
    assert(Math.abs(lerpAngle(0, Math.PI / 2, 1) - Math.PI / 2) < 1e-9, 'lerpAngle should reach the target in a full step');
    assert(Math.abs(lerpAngle(0, 3 * Math.PI / 2, 1) - (-Math.PI / 2)) < 1e-9, 'lerpAngle should take the short way around');
    return 'first packet snaps, then eases; heading takes the short way';
});

check('stats: the farm ledger bumps, totals, and round-trips (#18)', () => {
    clearStats();
    assert(getStat('harvested') === 0, 'a fresh ledger should read 0');
    bumpStat('harvested'); bumpStat('harvested', 4); bumpStat('fish');
    assert(getStat('harvested') === 5, 'bumps should accumulate');
    assert(getStat('fish') === 1, 'fish should be counted');
    const list = allStats();
    const h = list.find(s => s.key === 'harvested');
    assert(h && h.value === 5 && h.label.includes('harvested'), 'allStats should expose value + label');
    assert(list.length >= 6, 'every declared stat row should be present');
    const s = serializeStats(); clearStats();
    assert(getStat('harvested') === 0, 'cleared');
    loadStats(s);
    assert(getStat('harvested') === 5 && getStat('fish') === 1, 'should restore from the save');
    // crossing a threshold returns a milestone descriptor to celebrate
    clearStats();
    assert(bumpStat('fish', 9) === null, '9 fish should not hit a milestone yet');
    const hit = bumpStat('fish', 1); // crosses 10
    assert(hit && hit.key === 'fish' && hit.milestone === 10, 'the 10th fish should hit the 10-milestone');
    assert(bumpStat('fish', 1) === null, 'past a milestone should not re-fire it');
    clearStats();
    return 'totals + round-trip; 10th fish = milestone';
});

check('a sprinkler auto-waters the tiles around it', () => {

check('every factory input/output is a known item and adds value', () => {

check('a factory converts raw inputs into products over time', () => {

check('hiring workers speeds a factory up', () => {

});

check('spatial hash nearest agrees with brute force over a random set', () => {
    const h = createSpatialHash(4);
    const items = [];
    for (let i = 0; i < 80; i++) {
        const it = { x: Math.floor(Math.random() * 60 - 30), z: Math.floor(Math.random() * 60 - 30) };
        items.push(it); h.insert(it, it.x, it.z);
    }
    const qx = 2, qz = -3, R = 16;
    let brute = null, bd = R * R;
    for (const it of items) { const d = (it.x - qx) ** 2 + (it.z - qz) ** 2; if (d < bd) { bd = d; brute = it; } }
    const hit = h.nearest(qx, qz, R, null);
    const dh = hit ? (hit.x - qx) ** 2 + (hit.z - qz) ** 2 : Infinity;
    const db = brute ? (brute.x - qx) ** 2 + (brute.z - qz) ** 2 : Infinity;
    assert(dh === db, `hash nearest dist ${dh} != brute ${db}`);
    return `hash == brute over ${items.length} items`;
});

check('spatial hash within() returns everything inside the radius', () => {
    const h = createSpatialHash(5);
    for (let i = 0; i < 10; i++) { const it = { x: i, z: 0 }; h.insert(it, it.x, it.z); } // x=0..9
    assert(h.within(0, 0, 4.5, null).length === 5, `expected 5 within 4.5, got ${h.within(0, 0, 4.5, null).length}`);
    assert(h.within(0, 0, 100, o => o.x >= 7).length === 3, 'pred filter in within() failed');
    return 'within() + predicate OK';
});

    for (let d = 1; d <= 40 && (!gift || !req); d++) { const L = makeLetter(d); if (L.kind === 'gift') gift = L; else req = L; }
    assert(gift && gift.coins > 0, 'should produce gift letters with coins');
    assert(req && req.qty > 0 && req.reward > 0 && ITEMS[req.crop], 'request letter should be valid + reference a real crop');
    // fulfilling a request consumes the goods and pays the reward
    const inv = createInventory();
    assert(!canFulfill(req, inv), 'cannot fulfil empty-handed');
    assert(claimLetter(req, inv) === 0, 'unfulfillable request grants nothing');
    inv.add(req.crop, req.qty);
    assert(canFulfill(req, inv), 'can fulfil with the goods');
    assert(claimLetter(req, inv) === req.reward, 'fulfilling pays the reward');
    assert(inv.count(req.crop) === 0, 'delivered crops are consumed');
    // a gift just pays its coins
    assert(claimLetter(gift, createInventory()) === gift.coins, 'gift pays its coins');
    // claim tracking is per-day
    markClaimed(3);
    assert(isClaimed(3) && !isClaimed(4), 'claim tracking should be per-day');
    loadMail(null);
    return `gift +🪙${gift.coins}; request ${req.qty} ${req.crop} → 🪙${req.reward}`;
});

// ---------- RENDER ----------

const total = results.length;
const passed = results.filter(r => r.pass).length;
const sum = document.getElementById('summary');
sum.textContent = `${passed === total ? 'ALL PASS' : 'FAILURES'}  ${passed}/${total}`;
sum.className = passed === total ? 'ok' : 'bad';

const out = document.getElementById('results');
out.innerHTML = results.map(r =>
    `<div class="row ${r.pass ? 'pass' : 'fail'}">${r.name}` +
    (r.msg ? ` <span class="msg">— ${r.msg}</span>` : '') + `</div>`
).join('');

// machine-readable marker (handy if console capture is ever wired up)
document.title = `SUITE ${passed}/${total}`;
</script>
</body></html>
